name: release

on:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-15
    # secrets 上下文不能出现在 step 的 if 里，先映射到 job env 再判断
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      # 打包内置 CLI(cli.cjs)需要 pnpm workspace
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: setup ghostty assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash apps/desktop-macos/scripts/setup-ghostty.sh
      - name: import signing certificate
        if: ${{ env.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN"             -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:             -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
      - name: prepare notary key
        if: ${{ env.APPLE_API_KEY_BASE64 != '' }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "ACRO_NOTARY_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - name: package app
        env:
          ACRO_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          ACRO_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ACRO_NOTARY_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          # 未配置证书 secrets 时回退 ad-hoc
          export ACRO_SIGN_IDENTITY="${ACRO_SIGN_IDENTITY:--}"
          bash apps/desktop-macos/scripts/package-app.sh "$VERSION"
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 版本号带 - 视为预发布(测试通道),如 0.1.0-beta.1
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          FLAGS=(--generate-notes)
          [[ "$VERSION" == *-* ]] && FLAGS+=(--prerelease)
          ASSETS=(apps/desktop-macos/dist/Acro-v*-macos.dmg apps/desktop-macos/dist/Acro-v*-macos.zip)
          gh release create "$GITHUB_REF_NAME" "${ASSETS[@]}" "${FLAGS[@]}" \
            || gh release upload "$GITHUB_REF_NAME" "${ASSETS[@]}" --clobber
      - name: update appcast
        if: ${{ env.SPARKLE_PRIVATE_KEY != '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          CHANNEL=stable
          [[ "$VERSION" == *-* ]] && CHANNEL=beta
          ZIP="apps/desktop-macos/dist/Acro-v${VERSION}-macos.zip"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Acro-v${VERSION}-macos.zip"

          curl -sL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed.key"
          SIG_OUT="$("$RUNNER_TEMP/sparkle/bin/sign_update" --ed-key-file "$RUNNER_TEMP/sparkle_ed.key" "$ZIP")"
          rm "$RUNNER_TEMP/sparkle_ed.key"
          SIGNATURE=$(sed -n 's/.*edSignature="\([^"]*\)".*/\1/p' <<< "$SIG_OUT")
          LENGTH=$(sed -n 's/.*length="\([^"]*\)".*/\1/p' <<< "$SIG_OUT")
          [[ -n "$SIGNATURE" && -n "$LENGTH" ]] || { echo "sign_update output unusable: $SIG_OUT"; exit 1; }

          # appcast 提交到 main,客户端经 raw.githubusercontent.com 读取
          git fetch origin main
          git checkout main
          python3 apps/desktop-macos/scripts/update-appcast.py \
            apps/desktop-macos/appcast.xml "$VERSION" "$CHANNEL" "$URL" "$SIGNATURE" "$LENGTH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop-macos/appcast.xml
          git commit -m "chore(release): appcast entry for desktop-v${VERSION}"
          git push origin main
