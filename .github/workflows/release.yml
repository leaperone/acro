name: release

on:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  package:
    runs-on: macos-15
    # secrets 上下文不能出现在 step 的 if 里，先映射到 job env 再判断
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      # 打包内置 CLI(cli.cjs)需要 pnpm workspace
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: setup ghostty assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash apps/desktop-macos/scripts/setup-ghostty.sh
      - name: import signing certificate
        if: ${{ env.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN"             -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:             -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
      - name: prepare notary key
        if: ${{ env.APPLE_API_KEY_BASE64 != '' }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "ACRO_NOTARY_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - name: package app
        env:
          ACRO_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          ACRO_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ACRO_NOTARY_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          # 未配置证书 secrets 时回退 ad-hoc
          export ACRO_SIGN_IDENTITY="${ACRO_SIGN_IDENTITY:--}"
          bash apps/desktop-macos/scripts/package-app.sh "$VERSION" "$GITHUB_RUN_NUMBER"
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 版本号带 - 视为预发布(测试通道),如 0.1.0-beta.1
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          FLAGS=(--generate-notes)
          [[ "$VERSION" == *-* ]] && FLAGS+=(--prerelease)
          ASSETS=(apps/desktop-macos/dist/Acro-v*-macos.dmg apps/desktop-macos/dist/Acro-v*-macos.zip)
          gh release create "$GITHUB_REF_NAME" "${ASSETS[@]}" "${FLAGS[@]}" \
            || gh release upload "$GITHUB_REF_NAME" "${ASSETS[@]}" --clobber
      - name: update appcast and delta updates
        if: ${{ env.SPARKLE_PRIVATE_KEY != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          CHANNEL=stable
          [[ "$VERSION" == *-* ]] && CHANNEL=beta
          ZIP="apps/desktop-macos/dist/Acro-v${VERSION}-macos.zip"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Acro-v${VERSION}-macos.zip"

          SPARKLE_VERSION="$(jq -r '.pins[] | select(.identity == "sparkle") | .state.version' \
            apps/desktop-macos/Package.resolved)"
          [[ -n "$SPARKLE_VERSION" && "$SPARKLE_VERSION" != null ]]
          curl -fsSL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          umask 077
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed.key"
          trap 'rm -f "$RUNNER_TEMP/sparkle_ed.key"' EXIT

          SIG_OUT="$("$RUNNER_TEMP/sparkle/bin/sign_update" \
            --ed-key-file "$RUNNER_TEMP/sparkle_ed.key" "$ZIP")"
          SIGNATURE=$(sed -n 's/.*edSignature="\([^"]*\)".*/\1/p' <<< "$SIG_OUT")
          LENGTH=$(sed -n 's/.*length="\([^"]*\)".*/\1/p' <<< "$SIG_OUT")
          [[ -n "$SIGNATURE" && -n "$LENGTH" ]] \
            || { echo "sign_update output unusable: $SIG_OUT"; exit 1; }

          DELTAS_JSON="$RUNNER_TEMP/deltas.json"
          printf '[]' > "$DELTAS_JSON"
          RELEASES="$(gh release list --limit 20 --json tagName,isPrerelease)"
          STABLE_TAG="$(jq -r --arg current "$GITHUB_REF_NAME" \
            '.[] | select(.tagName != $current and .isPrerelease == false) | .tagName' \
            <<< "$RELEASES" | head -1)"
          BETA_TAG="$(jq -r --arg current "$GITHUB_REF_NAME" \
            '.[] | select(.tagName != $current and .isPrerelease == true) | .tagName' \
            <<< "$RELEASES" | head -1)"
          for TAG in "$STABLE_TAG" "$BETA_TAG"; do
            [[ -n "$TAG" ]] || continue
            FROM_VERSION="${TAG#desktop-v}"
            SOURCE="$RUNNER_TEMP/source-$FROM_VERSION"
            mkdir -p "$SOURCE/archive" "$SOURCE/app" "$SOURCE/applied"
            if ! gh release download "$TAG" --pattern 'Acro-v*-macos.zip' --dir "$SOURCE/archive"; then
              echo "::warning::Could not download $TAG; full update remains available"
              continue
            fi
            SOURCE_ZIP="$(find "$SOURCE/archive" -maxdepth 1 -name '*.zip' -print -quit)"
            ditto -x -k "$SOURCE_ZIP" "$SOURCE/app"
            SOURCE_BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' \
              "$SOURCE/app/Acro.app/Contents/Info.plist")"

            DELTA="apps/desktop-macos/dist/Acro-v${VERSION}-from-${FROM_VERSION}.delta"
            if ! "$RUNNER_TEMP/sparkle/bin/BinaryDelta" create \
              "$SOURCE/app/Acro.app" apps/desktop-macos/dist/Acro.app "$DELTA"; then
              echo "::warning::Could not create delta from $FROM_VERSION; full update remains available"
              rm -f "$DELTA"
              continue
            fi
            if ! "$RUNNER_TEMP/sparkle/bin/BinaryDelta" apply \
              "$SOURCE/app/Acro.app" "$SOURCE/applied/Acro.app" "$DELTA" \
              || ! codesign --verify --deep --strict "$SOURCE/applied/Acro.app"; then
              echo "::warning::Delta from $FROM_VERSION failed verification; full update remains available"
              rm -f "$DELTA"
              continue
            fi

            DELTA_SIG_OUT="$("$RUNNER_TEMP/sparkle/bin/sign_update" \
              --ed-key-file "$RUNNER_TEMP/sparkle_ed.key" "$DELTA")"
            DELTA_SIGNATURE=$(sed -n 's/.*edSignature="\([^"]*\)".*/\1/p' <<< "$DELTA_SIG_OUT")
            DELTA_LENGTH=$(sed -n 's/.*length="\([^"]*\)".*/\1/p' <<< "$DELTA_SIG_OUT")
            [[ -n "$DELTA_SIGNATURE" && -n "$DELTA_LENGTH" ]] \
              || { echo "delta sign_update output unusable: $DELTA_SIG_OUT"; exit 1; }
            DELTA_NAME="$(basename "$DELTA")"
            DELTA_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DELTA_NAME}"
            jq --arg from "$SOURCE_BUILD_VERSION" --arg url "$DELTA_URL" \
              --arg signature "$DELTA_SIGNATURE" --arg length "$DELTA_LENGTH" \
              '. + [{from: $from, url: $url, signature: $signature, length: $length}]' \
              "$DELTAS_JSON" > "$DELTAS_JSON.tmp"
            mv "$DELTAS_JSON.tmp" "$DELTAS_JSON"
            gh release upload "$GITHUB_REF_NAME" "$DELTA" --clobber
          done

          # appcast 提交到 main,客户端经 raw.githubusercontent.com 读取
          git fetch origin main
          git checkout main
          python3 apps/desktop-macos/scripts/update-appcast.py \
            apps/desktop-macos/appcast.xml "$VERSION" "$GITHUB_RUN_NUMBER" "$CHANNEL" \
            "$URL" "$SIGNATURE" "$LENGTH" "$DELTAS_JSON"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop-macos/appcast.xml
          git commit -m "chore(release): appcast entry for desktop-v${VERSION}"
          git push origin main
