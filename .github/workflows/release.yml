name: release

on:
  repository_dispatch:
    types: [desktop-release]

permissions:
  contents: read

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
      - name: verify release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
        run: |
          [[ "$GITHUB_REF" == refs/heads/main ]] \
            || { echo "release workflow must run from main, got $GITHUB_REF" >&2; exit 1; }
          gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[].tag_name' > "$RUNNER_TEMP/release-tags.txt"
          python3 apps/desktop-macos/scripts/release_versions.py verify "$RELEASE_TAG" \
            < "$RUNNER_TEMP/release-tags.txt"

          RELEASE_SHA="$(git rev-parse --verify "$RELEASE_TAG^{commit}")"
          MAIN_SHA="$(git rev-parse --verify 'origin/main^{commit}')"
          [[ "$RELEASE_SHA" == "$MAIN_SHA" ]] \
            || { echo "$RELEASE_TAG must point to current origin/main ($MAIN_SHA), got $RELEASE_SHA" >&2; exit 1; }
          {
            echo "tag=$RELEASE_TAG"
            echo "version=${RELEASE_TAG#desktop-v}"
            echo "sha=$RELEASE_SHA"
          } >> "$GITHUB_OUTPUT"

  package:
    needs: verify
    runs-on: macos-15
    environment: desktop-release
    permissions:
      contents: read
    env:
      RELEASE_SHA: ${{ needs.verify.outputs.sha }}
      RELEASE_TAG: ${{ needs.verify.outputs.tag }}
      VERSION: ${{ needs.verify.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_SHA }}
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: setup ghostty assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash apps/desktop-macos/scripts/setup-ghostty.sh
      - name: verify release credentials
        env:
          HAS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
          HAS_NOTARY: ${{ secrets.APPLE_API_KEY_BASE64 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' }}
          HAS_SPARKLE: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
        run: |
          [[ "$HAS_CERTIFICATE" == true ]] || { echo "signing secrets are incomplete" >&2; exit 1; }
          [[ "$HAS_NOTARY" == true ]] || { echo "notary secrets are incomplete" >&2; exit 1; }
          [[ "$HAS_SPARKLE" == true ]] || { echo "Sparkle secret is missing" >&2; exit 1; }
      - name: import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          umask 077
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
      - name: prepare notary key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          umask 077
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
      - name: package app
        env:
          ACRO_NOTARY_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          ACRO_NOTARY_KEY: ${{ runner.temp }}/AuthKey.p8
          ACRO_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ACRO_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: bash apps/desktop-macos/scripts/package-app.sh "$VERSION" "$GITHUB_RUN_NUMBER"
      - name: cleanup Apple credentials
        if: ${{ always() }}
        run: |
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/AuthKey.p8"
          security list-keychains -d user -s login.keychain 2>/dev/null || true
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
      - name: setup Sparkle tools
        run: |
          SPARKLE_VERSION="$(jq -r '.pins[] | select(.identity == "sparkle") | .state.version' \
            apps/desktop-macos/Package.resolved)"
          case "$SPARKLE_VERSION" in
            2.9.4) SPARKLE_SHA256=ce89daf967db1e1893ed3ebd67575ed82d3902563e3191ca92aaec9164fbdef9 ;;
            *) echo "untrusted Sparkle release: $SPARKLE_VERSION" >&2; exit 1 ;;
          esac
          curl --proto '=https' --tlsv1.2 -fsSL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          printf '%s  %s\n' "$SPARKLE_SHA256" "$RUNNER_TEMP/sparkle.tar.xz" \
            | shasum -a 256 -c -
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
      - name: write Sparkle private key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          umask 077
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed.key"
      - name: generate appcast and delta updates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANNEL=stable
          [[ "$VERSION" == *-* ]] && CHANNEL=beta
          ZIP="apps/desktop-macos/dist/Acro-v${VERSION}-macos.zip"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/Acro-v${VERSION}-macos.zip"

          SIG_OUT="$("$RUNNER_TEMP/sparkle/bin/sign_update" \
            --ed-key-file "$RUNNER_TEMP/sparkle_ed.key" "$ZIP")"
          SIGNATURE="$(sed -n 's/.*edSignature="\([^"]*\)".*/\1/p' <<< "$SIG_OUT")"
          LENGTH="$(sed -n 's/.*length="\([^"]*\)".*/\1/p' <<< "$SIG_OUT")"
          [[ -n "$SIGNATURE" && -n "$LENGTH" ]] \
            || { echo "sign_update output unusable: $SIG_OUT"; exit 1; }

          RELEASE_TAGS="$RUNNER_TEMP/release-tags.txt"
          gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[].tag_name' > "$RELEASE_TAGS"
          STABLE_TAG="$(python3 apps/desktop-macos/scripts/release_versions.py latest stable < "$RELEASE_TAGS")"
          BETA_TAG="$(python3 apps/desktop-macos/scripts/release_versions.py latest beta < "$RELEASE_TAGS")"
          DELTAS_JSON="$RUNNER_TEMP/deltas.json"
          printf '[]' > "$DELTAS_JSON"
          for TAG in "$STABLE_TAG" "$BETA_TAG"; do
            [[ -n "$TAG" ]] || continue
            FROM_VERSION="${TAG#desktop-v}"
            SOURCE="$RUNNER_TEMP/source-$FROM_VERSION"
            mkdir -p "$SOURCE/archive" "$SOURCE/app" "$SOURCE/clean" "$SOURCE/applied"
            if ! gh release download "$TAG" --pattern 'Acro-v*-macos.zip' --dir "$SOURCE/archive"; then
              echo "::warning::Could not download $TAG; full update remains available"
              continue
            fi
            SOURCE_ZIP="$(find "$SOURCE/archive" -maxdepth 1 -name '*.zip' -print -quit)"
            ditto -x -k "$SOURCE_ZIP" "$SOURCE/app"
            SOURCE_BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' \
              "$SOURCE/app/Acro.app/Contents/Info.plist")"
            # Legacy packages contain code-signing xattrs that BinaryDelta refuses to diff.
            # Generate from a clean copy, then apply to the untouched source below.
            ditto "$SOURCE/app/Acro.app" "$SOURCE/clean/Acro.app"
            xattr -cr "$SOURCE/clean/Acro.app"

            DELTA="apps/desktop-macos/dist/Acro-v${VERSION}-from-${FROM_VERSION}.delta"
            if ! "$RUNNER_TEMP/sparkle/bin/BinaryDelta" create \
              "$SOURCE/clean/Acro.app" apps/desktop-macos/dist/Acro.app "$DELTA"; then
              echo "::warning::Could not create delta from $FROM_VERSION; full update remains available"
              rm -f "$DELTA"
              continue
            fi
            if ! "$RUNNER_TEMP/sparkle/bin/BinaryDelta" apply \
              "$SOURCE/app/Acro.app" "$SOURCE/applied/Acro.app" "$DELTA" \
              || ! codesign --verify --deep --strict "$SOURCE/applied/Acro.app"; then
              echo "::warning::Delta from $FROM_VERSION failed verification; full update remains available"
              rm -f "$DELTA"
              continue
            fi

            DELTA_SIG_OUT="$("$RUNNER_TEMP/sparkle/bin/sign_update" \
              --ed-key-file "$RUNNER_TEMP/sparkle_ed.key" "$DELTA")"
            DELTA_SIGNATURE="$(sed -n 's/.*edSignature="\([^"]*\)".*/\1/p' <<< "$DELTA_SIG_OUT")"
            DELTA_LENGTH="$(sed -n 's/.*length="\([^"]*\)".*/\1/p' <<< "$DELTA_SIG_OUT")"
            [[ -n "$DELTA_SIGNATURE" && -n "$DELTA_LENGTH" ]] \
              || { echo "delta sign_update output unusable: $DELTA_SIG_OUT"; exit 1; }
            DELTA_NAME="$(basename "$DELTA")"
            DELTA_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${DELTA_NAME}"
            jq --arg from "$SOURCE_BUILD_VERSION" --arg url "$DELTA_URL" \
              --arg signature "$DELTA_SIGNATURE" --arg length "$DELTA_LENGTH" \
              '. + [{from: $from, url: $url, signature: $signature, length: $length}]' \
              "$DELTAS_JSON" > "$DELTAS_JSON.tmp"
            mv "$DELTAS_JSON.tmp" "$DELTAS_JSON"
          done

          python3 apps/desktop-macos/scripts/update-appcast.py \
            apps/desktop-macos/appcast.xml "$VERSION" "$GITHUB_RUN_NUMBER" "$CHANNEL" \
            "$URL" "$SIGNATURE" "$LENGTH" "$DELTAS_JSON"

          ARTIFACT_DIR="$RUNNER_TEMP/desktop-release"
          mkdir -p "$ARTIFACT_DIR"
          cp "apps/desktop-macos/dist/Acro-v${VERSION}-macos.dmg" \
            "apps/desktop-macos/dist/Acro-v${VERSION}-macos.zip" \
            apps/desktop-macos/appcast.xml "$ARTIFACT_DIR/"
          find apps/desktop-macos/dist -maxdepth 1 \
            -name "Acro-v${VERSION}-from-*.delta" -exec cp {} "$ARTIFACT_DIR/" \;
      - name: cleanup Sparkle private key
        if: ${{ always() }}
        run: rm -f "$RUNNER_TEMP/sparkle_ed.key"
      - name: upload complete release
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-release
          path: ${{ runner.temp }}/desktop-release
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  publish:
    needs: [verify, package]
    runs-on: ubuntu-latest
    environment: desktop-release
    permissions:
      contents: write
    env:
      RELEASE_SHA: ${{ needs.verify.outputs.sha }}
      RELEASE_TAG: ${{ needs.verify.outputs.tag }}
      VERSION: ${{ needs.verify.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: desktop-release
          path: release-artifact
      - name: verify release artifact
        id: artifact
        run: |
          TAG_SHA="$(git rev-parse --verify "$RELEASE_TAG^{commit}")"
          [[ "$TAG_SHA" == "$RELEASE_SHA" ]] \
            || { echo "$RELEASE_TAG moved from $RELEASE_SHA to $TAG_SHA" >&2; exit 1; }
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main \
            || { echo "$RELEASE_SHA is no longer on origin/main" >&2; exit 1; }
          if cmp -s apps/desktop-macos/appcast.xml release-artifact/appcast.xml; then
            echo "appcast_published=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$RELEASE_SHA" -- apps/desktop-macos/appcast.xml; then
            echo "appcast_published=false" >> "$GITHUB_OUTPUT"
          else
            echo "appcast changed after release verification" >&2
            exit 1
          fi
          DMG="release-artifact/Acro-v${VERSION}-macos.dmg"
          ZIP="release-artifact/Acro-v${VERSION}-macos.zip"
          [[ -f "$DMG" && -f "$ZIP" && -f release-artifact/appcast.xml ]] \
            || { echo "release artifact is incomplete" >&2; exit 1; }
      - name: verify publish credentials
        if: ${{ steps.artifact.outputs.appcast_published != 'true' }}
        env:
          HAS_RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN != '' }}
        run: |
          [[ "$HAS_RELEASE_PUSH_TOKEN" == true ]] \
            || { echo "protected main push token is missing" >&2; exit 1; }
      - name: create or verify GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG="release-artifact/Acro-v${VERSION}-macos.dmg"
          ZIP="release-artifact/Acro-v${VERSION}-macos.zip"
          ASSETS=("$DMG" "$ZIP")
          while IFS= read -r DELTA; do ASSETS+=("$DELTA"); done \
            < <(find release-artifact -maxdepth 1 -name "Acro-v${VERSION}-from-*.delta" -print | sort)

          EXPECTED_ASSETS="$RUNNER_TEMP/expected-assets.tsv"
          for ASSET in "${ASSETS[@]}"; do
            printf '%s\tsha256:%s\tuploaded\n' \
              "$(basename "$ASSET")" "$(sha256sum "$ASSET" | cut -d ' ' -f 1)"
          done | sort > "$EXPECTED_ASSETS"

          RELEASES="$RUNNER_TEMP/releases.json"
          RELEASE="$RUNNER_TEMP/release.json"
          ACTUAL_ASSETS="$RUNNER_TEMP/actual-assets.tsv"
          fetch_release() {
            gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/releases?per_page=100" > "$RELEASES"
            MATCH_COUNT="$(jq --arg tag "$RELEASE_TAG" \
              '[.[][] | select(.tag_name == $tag)] | length' "$RELEASES")"
            [[ "$MATCH_COUNT" -le 1 ]] \
              || { echo "multiple Releases found for $RELEASE_TAG" >&2; exit 1; }
            jq --arg tag "$RELEASE_TAG" \
              '[.[][] | select(.tag_name == $tag)] | .[0] // empty' "$RELEASES" > "$RELEASE"
          }
          write_actual_assets() {
            jq -r '.assets[] | [.name, .digest, .state] | @tsv' "$RELEASE" \
              | sort > "$ACTUAL_ASSETS"
          }

          fetch_release
          if [[ ! -s "$RELEASE" ]]; then
            FLAGS=(--generate-notes --verify-tag)
            [[ "$VERSION" == *-* ]] && FLAGS+=(--prerelease)
            gh release create "$RELEASE_TAG" "${ASSETS[@]}" "${FLAGS[@]}"
          else
            EXPECTED_PRERELEASE=false
            [[ "$VERSION" == *-* ]] && EXPECTED_PRERELEASE=true
            jq -e --argjson prerelease "$EXPECTED_PRERELEASE" \
              '.prerelease == $prerelease' "$RELEASE" > /dev/null \
              || { echo "$RELEASE_TAG prerelease state does not match" >&2; exit 1; }
            write_actual_assets

            if [[ "$(jq -r '.draft' "$RELEASE")" == true ]]; then
              comm -13 "$EXPECTED_ASSETS" "$ACTUAL_ASSETS" > "$RUNNER_TEMP/unexpected-assets.tsv"
              [[ ! -s "$RUNNER_TEMP/unexpected-assets.tsv" ]] \
                || { echo "$RELEASE_TAG draft has unexpected or mismatched assets" >&2; exit 1; }

              declare -A ASSET_PATHS
              for ASSET in "${ASSETS[@]}"; do ASSET_PATHS["$(basename "$ASSET")"]="$ASSET"; done
              MISSING_ASSETS=()
              while IFS=$'\t' read -r NAME _; do MISSING_ASSETS+=("${ASSET_PATHS[$NAME]}"); done \
                < <(comm -23 "$EXPECTED_ASSETS" "$ACTUAL_ASSETS")
              [[ "${#MISSING_ASSETS[@]}" -eq 0 ]] \
                || gh release upload "$RELEASE_TAG" "${MISSING_ASSETS[@]}"

              fetch_release
              write_actual_assets
              diff -u "$EXPECTED_ASSETS" "$ACTUAL_ASSETS"
              gh release edit "$RELEASE_TAG" --draft=false
            else
              diff -u "$EXPECTED_ASSETS" "$ACTUAL_ASSETS"
            fi
          fi
      - name: publish appcast
        if: ${{ steps.artifact.outputs.appcast_published != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          cp release-artifact/appcast.xml apps/desktop-macos/appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop-macos/appcast.xml
          git commit -m "chore(release): appcast entry for $RELEASE_TAG"
          gh auth setup-git
          if ! git push origin HEAD:main; then
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
